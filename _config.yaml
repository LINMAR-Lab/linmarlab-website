# site properties and page defaults
title: LINMAR-Lab
subtitle: Living Networks of Microbial Adaptation
description: We explore the hidden partnerships between cyanobacteria and bacterial communities to explore the evolutionary paradox of mutualism..
header: images/background2.jpg
footer: images/background2.jpg
proofer: false

# site social media and other links
links:
  email: linmarlab@uma.es
  orcid: 0000-0003-1667-2218
  google-scholar: o-uG0C8AAAAJ
  github: LINMAR-Lab
  twitter: LINMAR-Lab
  youtube: LINMAR-Lab

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
